{% extends 'events/base.html' %}
{% block title %}Delete {{ type }} - EventMS{% endblock title %}
{% block content %}
<div class="max-w-md mx-auto">
    <div class="bg-white rounded-xl shadow-sm overflow-hidden">
        <div class="h-2 bg-red-500"></div>
        <div class="p-8 text-center">
            <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
                </svg>
            </div>
            <h1 class="text-xl font-bold text-gray-900 mb-2">Delete {{ type }}</h1>
            <p class="text-gray-500 text-sm mb-6">
                Are you sure you want to delete <strong>{{ object }}</strong>?<br>
                This action cannot be undone.
            </p>
            <form method="POST" class="flex gap-3 justify-center">
                {% csrf_token %}
                <button type="submit"
                        class="bg-red-600 text-white text-sm font-medium px-5 py-2 rounded-lg hover:bg-red-700 transition">
                    Yes, Delete
                </button>
                <a href="javascript:history.back()"
                   class="bg-gray-100 text-gray-700 text-sm font-medium px-5 py-2 rounded-lg hover:bg-gray-200 transition">
                    Cancel
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock content %}
